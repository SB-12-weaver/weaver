spring:
  sql:
    init:
      mode: never
      schema-locations: classpath:hrbank_schema_latest_erd.sql
      data-locations: classpath:data.sql

  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:weaverdb}
    driver-class-name: org.postgresql.Driver
    username: ${PGUSER:user1}
    password: ${PGPASSWORD:1234}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    org.springframework.web: info